name: Deploy Lambda Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy function-1 if changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -q "functions/function-1"; then
            echo "Deploying function-1..."
            zip deployment.zip functions/function-1/lambda_function.py
            aws lambda update-function-code --function-name my-pipeline-lambda --zip-file fileb://deployment.zip
            echo "function-1 deployed!"
          else
            echo "No changes in function-1, skipping..."
          fi

      - name: Deploy function-2 if changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -q "functions/function-2"; then
            echo "Deploying function-2..."
            cd functions/function-2 && zip ../../deployment.zip lambda_function.py && cd ../..
            aws lambda update-function-code --function-name my-pipeline-function-2 --zip-file fileb://deployment.zip
            echo "function-2 deployed!"
          else
            echo "No changes in function-2, skipping..."
          fi

      - name: Deploy function-3 if changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -q "functions/function-3"; then
            echo "Deploying function-3..."
            zip deployment.zip functions/function-3/lambda_function.py
            aws lambda update-function-code --function-name my-pipeline-function-3 --zip-file fileb://deployment.zip
            echo "function-3 deployed!"
          else
            echo "No changes in function-3, skipping..."
          fi
